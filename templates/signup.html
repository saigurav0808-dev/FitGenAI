<!DOCTYPE html>
<html>
<head>
<title>Signup</title>

<style>

body{
font-family:Arial;
background:#0f172a;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.card{
background:white;
padding:40px;
border-radius:10px;
width:320px;
text-align:center;
}

input{
width:100%;
padding:10px;
margin:10px 0;
border:1px solid #ccc;
border-radius:6px;
}

button{
width:100%;
padding:10px;
background:#22c55e;
color:white;
border:none;
border-radius:6px;
font-size:16px;
}

</style>
</head>

<body>

<div class="card">

<h2>Create Account</h2>

<form method="post">

<input type="text" name="name" placeholder="Name" required>

<input type="email" name="email" placeholder="Email" required>

<input type="password" name="password" placeholder="Password" required>

<button type="submit">Signup</button>

</form>

<p>Already have account? <a href="/login">Login</a></p>

</div>

</body>
</html>
